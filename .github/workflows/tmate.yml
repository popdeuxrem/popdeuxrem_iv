name: Start SSH via tmate
on: [push]

jobs:
  bridge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      codespaces: write # Required for 'gh cs ssh'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install GitHub CLI & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gh tmate
          
      - name: Setup tmate Session
        uses: P3TERX/ssh2actions@main
        with:
          detached: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Keep-Alive & Codespace Sync
        run: |
          # 1. Initialize the signal file to prevent immediate exit
          touch /tmp/continue
          
          echo "SSH Session is active."
          echo "To stop the session, run: rm /tmp/continue"
          
          # 2. Wait briefly for tmate to initialize the log
          sleep 5
          
          # 3. Robust keep-alive loop
          # Limits to 6 hours (GitHub Actions max) or until /tmp/continue is removed
          timeout 6h bash -c '
          while [ -f /tmp/continue ]; do
            if ! pgrep -x "tmate" > /dev/null; then
              echo "tmate process exited."
              break
            fi
            
            # Print connection string to logs if tmate.log exists
            if [ -f ~/.tmate.log ]; then
              grep "ssh" ~/.tmate.log | tail -n 1
            fi
            
            sleep 60
          done'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
