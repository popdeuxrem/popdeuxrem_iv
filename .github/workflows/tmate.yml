name: Start SSH via tmate
on:
  push:

jobs:
  bridge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      codespaces: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install GitHub CLI & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gh
          
      - name: Setup tmate Session
        uses: P3TERX/ssh2actions@main
        with:
          detached: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Keep-Alive & Codespace Sync
        run: |
          # Create the signal file immediately
          touch /tmp/continue
          
          echo "SSH Session is active."
          
          # Wait for tmate socket to be ready
          timeout 30s bash -c 'until [ -S /tmp/tmate.sock ]; do sleep 1; done'
          
          # Display connection info in logs
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          
          while [ -f /tmp/continue ]; do
            sleep 60
            # Optional: Add logic to check if connection is still alive
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
