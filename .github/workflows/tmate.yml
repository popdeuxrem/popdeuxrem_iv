name: Start SSH via tmate
on: [push]

jobs:
  bridge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      codespaces: write # Required for 'gh cs' operations
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install GitHub CLI & Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gh tmate
          
      - name: Setup tmate Session
        uses: P3TERX/ssh2actions@main
        with:
          detached: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Keep-Alive & Connection Diagnostics
        run: |
          # 1. Create the semaphore file to ensure the loop runs
          touch /tmp/continue
          
          echo "Checking for tmate connection strings..."
          
          # 2. Wait for tmate to initialize and display the SSH connection string
          timeout 30s bash -c 'until [ -S /tmp/tmate.sock ]; do sleep 1; done'
          TMATE_SSH=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}')
          
          echo "------------------------------------------------------------"
          echo "CONNECT VIA SSH: $TMATE_SSH"
          echo "------------------------------------------------------------"
          
          # 3. Non-blocking check for Codespaces
          echo "Available Codespaces:"
          gh cs list || echo "No Codespaces found or GH_TOKEN lacks permissions."

          # 4. Sustenance Loop
          while [ -f /tmp/continue ]; do
            if ! pgrep -x "tmate" > /dev/null; then
              echo "tmate process exited. Shutting down runner."
              exit 0
            fi
            sleep 60
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
